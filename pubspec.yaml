name: playvision
description: "PlayVision - análisis de rendimiento en fútbol con IA"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.12.0

  # Selección de videos/imágenes
  image_picker: ^1.1.2

  # Utilidades
  intl: ^0.20.2

  # HTTP cliente
  http: ^1.6.0

  # Gráficas
  fl_chart: ^0.69.0

  # Reproductor de video
  video_player: ^2.9.2

  # Variables de entorno
  flutter_dotenv: ^5.2.1
  pointer_interceptor: ^0.10.1+2
  
  # Internacionalización
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true    # <--- Activamos la generación de código para i18n
  assets:
    - .env