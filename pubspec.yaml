name: playvision
description: "PlayVision - análisis de rendimiento en fútbol con IA"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.12.0

  # Selección de videos/imágenes
  image_picker: ^1.1.2

  # Estado global
  flutter_riverpod: ^2.6.1

  # Geolocalización
  geolocator: ^14.0.2

  # Utilidades
  intl: ^0.20.2

  # HTTP cliente
  http: ^1.2.0

  # Gráficas
  fl_chart: ^0.69.0

  # Variables de entorno
  flutter_dotenv: ^5.2.1

  # Base de datos local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generación de código
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
